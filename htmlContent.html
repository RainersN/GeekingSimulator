<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<link rel="stylesheet" href="cssStyle.css">
		<title>Geeking Simulator</title>
	</head>
	<body onload="pageLoad()">
		<h1>GEEKING SIMULATOR</h1>
		<div class="scroll-container">
			<div class="text-row" id="textRow">
				<span class="text-scroll" id="textScroll" style = "transform: translateX(-100%);"></span>
			</div> 
		</div>
		<div class = "container">
			<div class = "containerLeft">
				<div class = "resetContainer" id = "resetContainer">
					<div><button type="button" onclick="reset()">RESET</button></div>
					<!-- <div><button type="button" onclick="save()">SAVE</button></div> -->
					<!-- It will return...eventually -->
				</div>
			</div>
			<div class = "containerCenter">
				<div class = "geekpointsDisplay"><span>GeekPoints™: </span><span id = "amountDisplay"></span></div>
				<div><button type="button" class = "geekButton" onclick="geekClick()">Geek</button></div>
				<img src="https://cdn3.emoji.gg/emojis/3430_epstein.png" alt="Epstein" class = "Epstein">
				<div id = "uiDiv"><span>Time until UI update drops: </span><span id="uiClock"></span></div>
			</div>
			
			<div class = "containerRight">
				<div class = "containerUpgrade">
					<div><button type="button" onclick="buyItem(0)"><span>Click Efficiency level: </span><span id = "amountDisplay0"></span><br><span>Upgrade cost: </span><span id = "costDisplay0"></span></button></div>
				</div>
				<div class = "containerUpgrade">
					<div><button type="button" onclick="buyItem(1)"><span>Auto-Geeker v1™: </span><span id = "amountDisplay1"></span><br><span>Upgrade cost: </span><span id = "costDisplay1"></span></button></div>
				</div>
				<div class = "containerUpgrade">
					<div><button type="button" onclick="buyItem(2)"><span>Auto-Geeker v2™: </span><span id = "amountDisplay2"></span><br><span>Upgrade cost: </span><span id = "costDisplay2"></span></button></div>
				</div>
				<div class = "containerUpgrade">
					<div><button type="button" onclick="buyItem(3)"><span>GeekPoints™ Multiplier: </span><span id = "amountDisplay3"></span><br><span>Upgrade cost: </span><span id = "costDisplay3"></span></button></div>
				</div>
				<div class = "containerUpgrade">
					<div><button type="button" onclick="buyItem(4)"><span>GeekPoints™ Power^: </span><span id = "amountDisplay4"></span><br><span>Upgrade cost: </span><span id = "costDisplay4"></span></button></div>
				</div>
			</div>
		</div>
		<div class = "containerTed" id = "containerTed">
			<div id="test1">
				<button type="button" class="image-button" id="ted" onclick="tedStop()"></button>
			</div>
		</div>
	</body>
	<script src="script.js"></script>
</html>
